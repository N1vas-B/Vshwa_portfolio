<!-- Overlay -->
<div class="overlay" *ngIf="navbarOpen" (click)="closeNavbar()"></div>

<!-- Sidebar -->
<nav class="sidebar" [class.open]="navbarOpen">
  <div class="sidebar-header">
    <button class="close-btn" (click)="closeNavbar()" aria-label="Close">&times;</button>
  </div>
  <ul class="nav flex-row flex-wrap justify-content-center align-items-center">
    <li class="nav-item">
      <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeNavbar()">Home</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" routerLink="/about" routerLinkActive="active" (click)="closeNavbar()">About</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" routerLink="/experience" routerLinkActive="active" (click)="closeNavbar()">Internship</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" routerLink="/projects" routerLinkActive="active" (click)="closeNavbar()">Projects</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" routerLink="/contact" routerLinkActive="active" (click)="closeNavbar()">Contact</a>
    </li>
    <li class="nav-item">
      <button class="btn btn-outline-light theme-toggle-btn" (click)="toggleDarkMode()" aria-label="Toggle theme">
        <i class="bi" [ngClass]="isDarkMode ? 'bi-sun-fill' : 'bi-moon-fill'"></i>
      </button>
    </li>
  </ul>
</nav>

<!-- Hamburger Icon: only one -->
<button
  class="hamburger"
  [ngClass]="{ 'hidden': !showHamburger }"
  (click)="toggleNavbar()"
  aria-label="Open Menu"
>
  &#9776;
</button>

<!-- Brand Logo Fixed Top-Right -->
<a class="navbar-brand d-flex align-items-center" routerLink="/" (click)="closeNavbar()">
  <svg width="40" height="40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 20 L35 20 L50 65 L65 20 L80 20 L55 80 L45 80 Z" fill="#f8f4f4" />
    <path d="M30 30 L40 30 L50 55 L60 30 L70 30 L55 65 L45 65 Z" fill="#2c3e50" />
  </svg>
</a>
